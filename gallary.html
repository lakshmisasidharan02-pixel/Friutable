<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Gallery</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
        }

        h1 {
            text-align: center;
            color: red;
        }

        .gallery {
            display: grid;
            grid-template-columns: repeat(4, 1fr); 
            gap: 15px;
            padding: 25px;
        }

        .gallery img {
            width: 100%;
            height: 150px;
            object-fit: cover;
        }
    </style>
</head>
<body>

<h1>Image Gallery</h1>

<div class="gallery">
    <img src="nature1.jpg">
    <img src="nature2.jpg">
    <img src="nature3.jpg">
    <img src="nature4.jpg">

    <img src="nature5.jpg">
    <img src="nature1.jpg">
    <img src="nature2.jpg">
    <img src="nature3.jpg">

    <img src="nature5.jpg">
    <img src="nature4.jpg">
    <img src="nature1.jpg">
    <img src="nature2.jpg">
</div>

</body>
</html>
